<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Agent Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 24px; max-width: 800px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 4px; }
    .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 24px; }
    .adapters { display: flex; gap: 8px; margin-bottom: 24px; }
    .adapter-badge { padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
    .adapter-badge.available { background: #1a3a1a; color: #4ade80; }
    .adapter-badge.unavailable { background: #3a1a1a; color: #f87171; }
    .adapter-badge.loading { background: #2a2a2a; color: #888; }

    /* Form */
    .create-form { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 16px; margin-bottom: 24px; }
    .create-form input, .create-form textarea { width: 100%; background: #0f0f0f; border: 1px solid #333; color: #e0e0e0; padding: 8px 12px; border-radius: 6px; font-size: 0.9rem; margin-bottom: 8px; font-family: inherit; }
    .create-form textarea { resize: vertical; min-height: 60px; }
    .create-form button { background: #2563eb; color: white; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
    .create-form button:hover { background: #1d4ed8; }

    /* Todo cards */
    .todo-list { display: flex; flex-direction: column; gap: 12px; }
    .todo-card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 16px; }
    .todo-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .todo-title { font-weight: 600; font-size: 1rem; }
    .todo-desc { color: #aaa; font-size: 0.85rem; margin-bottom: 12px; }
    .todo-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
    .btn-claude { background: #7c3aed; color: white; }
    .btn-claude:hover { background: #6d28d9; }
    .btn-codex { background: #059669; color: white; }
    .btn-codex:hover { background: #047857; }
    .btn-delete { background: transparent; color: #666; border: 1px solid #333; }
    .btn-delete:hover { color: #f87171; border-color: #f87171; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Status badges */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
    .badge-pending { background: #333; color: #aaa; }
    .badge-running { background: #1e3a5f; color: #60a5fa; animation: pulse 1.5s infinite; }
    .badge-done { background: #1a3a1a; color: #4ade80; }
    .badge-failed { background: #3a1a1a; color: #f87171; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* Event log */
    .event-log { background: #111; border: 1px solid #282828; border-radius: 6px; padding: 10px; margin-top: 12px; max-height: 300px; overflow-y: auto; font-family: "SF Mono", "Fira Code", monospace; font-size: 0.78rem; line-height: 1.5; }
    .event { padding: 2px 0; }
    .event-system { color: #888; font-style: italic; }
    .event-assistant { color: #e0e0e0; }
    .event-thinking { color: #a78bfa; }
    .event-tool_call { color: #60a5fa; }
    .event-tool_result { color: #4ade80; }
    .event-tool_result.error { color: #f87171; }
    .event-result { color: #fbbf24; font-weight: 600; }

    /* Result panel */
    .result-panel { background: #111; border: 1px solid #282828; border-radius: 6px; padding: 12px; margin-top: 12px; font-size: 0.85rem; }
    .result-panel .label { color: #888; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 2px; }
    .result-panel .value { margin-bottom: 8px; }
    .result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; }

    .empty { text-align: center; color: #555; padding: 40px; }
  </style>
</head>
<body>
  <h1>Todo Agent Demo</h1>
  <p class="subtitle">Create todos and dispatch them to AI agents for execution</p>
  <div class="adapters" id="adapters">
    <span class="adapter-badge loading">claude: checking...</span>
    <span class="adapter-badge loading">codex: checking...</span>
  </div>

  <div class="create-form">
    <input type="text" id="title" placeholder="Todo title (e.g. Write a hello world script)" />
    <textarea id="description" placeholder="Description (e.g. Create a file hello.ts that prints hello world)"></textarea>
    <button onclick="createTodo()">Add Todo</button>
  </div>

  <div class="todo-list" id="todoList"></div>

  <script>
    const adapterAvailability = {};
    const eventSources = {};
    const eventLogs = {}; // todoId -> array of event strings

    // -----------------------------------------------------------------------
    // API helpers
    // -----------------------------------------------------------------------
    async function api(method, path, body) {
      const opts = { method, headers: { "Content-Type": "application/json" } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(path, opts);
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        throw new Error(err.error || res.statusText);
      }
      if (res.status === 204) return null;
      return res.json();
    }

    // -----------------------------------------------------------------------
    // Load adapter availability
    // -----------------------------------------------------------------------
    async function loadAdapters() {
      try {
        const data = await api("GET", "/api/adapters");
        Object.assign(adapterAvailability, data);
        const el = document.getElementById("adapters");
        el.innerHTML = Object.entries(data)
          .filter(([name]) => ["claude", "codex"].includes(name))
          .map(([name, ok]) =>
            `<span class="adapter-badge ${ok ? "available" : "unavailable"}">${name}: ${ok ? "available" : "not found"}</span>`
          ).join("");
      } catch {
        document.getElementById("adapters").innerHTML =
          '<span class="adapter-badge unavailable">Failed to check adapters</span>';
      }
    }

    // -----------------------------------------------------------------------
    // Render
    // -----------------------------------------------------------------------
    async function loadTodos() {
      const todos = await api("GET", "/api/todos");
      render(todos);
    }

    function render(todos) {
      const el = document.getElementById("todoList");
      if (!todos.length) {
        el.innerHTML = '<div class="empty">No todos yet. Create one above!</div>';
        return;
      }
      el.innerHTML = todos.map(renderTodo).join("");
      // Re-attach SSE for any running todos
      for (const t of todos) {
        if (t.status === "running" && !eventSources[t.id]) {
          attachSSE(t.id);
        }
      }
    }

    function renderTodo(todo) {
      const canRun = todo.status === "pending" || todo.status === "failed";
      const isRunning = todo.status === "running";
      const isDone = todo.status === "done" || todo.status === "failed";

      let extra = "";

      if (isRunning || eventLogs[todo.id]?.length) {
        const logs = (eventLogs[todo.id] || []).join("");
        extra += `<div class="event-log" id="log-${todo.id}">${logs || '<span class="event event-system">Waiting for events...</span>'}</div>`;
      }

      if (isDone && todo.agentResult) {
        const r = todo.agentResult;
        extra += `
          <div class="result-panel">
            ${r.summary ? `<div class="label">Summary</div><div class="value">${esc(r.summary)}</div>` : ""}
            <div class="result-grid">
              ${r.model ? `<div><div class="label">Model</div><div class="value">${esc(r.model)}</div></div>` : ""}
              ${r.costUsd != null ? `<div><div class="label">Cost</div><div class="value">$${r.costUsd.toFixed(4)}</div></div>` : ""}
              <div><div class="label">Duration</div><div class="value">${(r.durationMs / 1000).toFixed(1)}s</div></div>
              <div><div class="label">Exit Code</div><div class="value">${r.exitCode ?? "N/A"}</div></div>
            </div>
            ${r.errorMessage ? `<div class="label" style="margin-top:8px">Error</div><div class="value" style="color:#f87171">${esc(r.errorMessage)}</div>` : ""}
          </div>`;
      }

      return `
        <div class="todo-card" id="card-${todo.id}">
          <div class="todo-header">
            <span class="todo-title">${esc(todo.title)}</span>
            <span class="badge badge-${todo.status}">${todo.status}${todo.agentType ? ` (${todo.agentType})` : ""}</span>
          </div>
          ${todo.description ? `<div class="todo-desc">${esc(todo.description)}</div>` : ""}
          <div class="todo-actions">
            ${canRun ? `
              <button class="btn btn-claude" onclick="executeTodo('${todo.id}','claude')" ${!adapterAvailability.claude ? "disabled title='Claude not available'" : ""}>Run with Claude</button>
              <button class="btn btn-codex" onclick="executeTodo('${todo.id}','codex')" ${!adapterAvailability.codex ? "disabled title='Codex not available'" : ""}>Run with Codex</button>
            ` : ""}
            ${!isRunning ? `<button class="btn btn-delete" onclick="removeTodo('${todo.id}')">Delete</button>` : ""}
          </div>
          ${extra}
        </div>`;
    }

    function esc(str) {
      const d = document.createElement("div");
      d.textContent = str;
      return d.innerHTML;
    }

    // -----------------------------------------------------------------------
    // Actions
    // -----------------------------------------------------------------------
    async function createTodo() {
      const title = document.getElementById("title").value.trim();
      const description = document.getElementById("description").value.trim();
      if (!title) return alert("Title is required");
      await api("POST", "/api/todos", { title, description });
      document.getElementById("title").value = "";
      document.getElementById("description").value = "";
      loadTodos();
    }

    async function removeTodo(id) {
      await api("DELETE", `/api/todos/${id}`);
      delete eventLogs[id];
      loadTodos();
    }

    async function executeTodo(id, agentType) {
      try {
        eventLogs[id] = [];
        await api("POST", `/api/todos/${id}/execute`, { agentType });
        loadTodos();
        attachSSE(id);
      } catch (err) {
        alert(err.message);
      }
    }

    // -----------------------------------------------------------------------
    // SSE
    // -----------------------------------------------------------------------
    function attachSSE(todoId) {
      if (eventSources[todoId]) return;
      const es = new EventSource(`/api/todos/${todoId}/events`);
      eventSources[todoId] = es;

      es.onmessage = (e) => {
        const event = JSON.parse(e.data);
        if (event.type === "close") {
          es.close();
          delete eventSources[todoId];
          loadTodos();
          return;
        }
        if (event.type === "done") {
          // Final reload will pick up result
          return;
        }
        appendEvent(todoId, event);
      };

      es.onerror = () => {
        es.close();
        delete eventSources[todoId];
        loadTodos();
      };
    }

    function appendEvent(todoId, event) {
      const html = formatEvent(event);
      if (!html) return;
      if (!eventLogs[todoId]) eventLogs[todoId] = [];
      eventLogs[todoId].push(html);

      const logEl = document.getElementById(`log-${todoId}`);
      if (logEl) {
        logEl.innerHTML = eventLogs[todoId].join("");
        logEl.scrollTop = logEl.scrollHeight;
      }
    }

    function formatEvent(event) {
      const d = event.data || event;
      switch (event.type) {
        case "system":
          return `<div class="event event-system">${esc(d.message || "System event")}</div>`;
        case "assistant":
          return `<div class="event event-assistant">${esc(d.text || "")}</div>`;
        case "thinking":
          const text = (d.text || "").slice(0, 100) + ((d.text || "").length > 100 ? "..." : "");
          return `<div class="event event-thinking">[thinking] ${esc(text)}</div>`;
        case "tool_call":
          return `<div class="event event-tool_call">[tool] ${esc(d.name || "unknown")}(${truncJson(d.input)})</div>`;
        case "tool_result":
          const cls = d.isError ? "event-tool_result error" : "event-tool_result";
          const content = (d.content || "").slice(0, 200);
          return `<div class="event ${cls}">[result] ${esc(content)}${(d.content || "").length > 200 ? "..." : ""}</div>`;
        case "result":
          const cost = d.cost != null ? ` | $${d.cost.toFixed(4)}` : "";
          return `<div class="event event-result">[done] ${esc(d.text || "")}${cost}</div>`;
        default:
          return "";
      }
    }

    function truncJson(obj) {
      try {
        const s = JSON.stringify(obj);
        return esc(s.length > 80 ? s.slice(0, 80) + "..." : s);
      } catch {
        return "...";
      }
    }

    // -----------------------------------------------------------------------
    // Init
    // -----------------------------------------------------------------------
    loadAdapters();
    loadTodos();
  </script>
</body>
</html>
