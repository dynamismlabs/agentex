<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Agent Demo</title>
    <style>
      :root {
        --bg-main: #0a0a0a;
        --bg-card: #141414;
        --bg-input: #0f0f0f;
        --bg-hover: #1f1f1f;

        --border-color: #2a2a2a;
        --border-focus: #444;

        --text-main: #ededed;
        --text-muted: #a1a1aa;
        --text-faint: #71717a;

        --accent-blue: #3b82f6;
        --accent-blue-hover: #2563eb;
        --accent-purple: #8b5cf6;
        --accent-purple-hover: #7c3aed;
        --accent-green: #10b981;
        --accent-green-hover: #059669;
        --accent-red: #ef4444;

        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 14px;
        --radius-full: 9999px;

        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.5);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
        background: var(--bg-main);
        color: var(--text-main);
        padding: 40px 24px;
        max-width: 840px;
        margin: 0 auto;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      /* Header */
      .header {
        margin-bottom: 32px;
        text-align: center;
      }
      h1 {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: -0.025em;
        margin-bottom: 8px;
        background: linear-gradient(to right, #fff, #a1a1aa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .subtitle {
        color: var(--text-muted);
        font-size: 1rem;
      }

      /* Providers */
      .providers {
        display: flex;
        gap: 10px;
        margin-bottom: 32px;
        justify-content: center;
      }
      .provider-badge {
        padding: 6px 12px;
        border-radius: var(--radius-full);
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        border: 1px solid transparent;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .provider-badge::before {
        content: '';
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }
      .provider-badge.available {
        background: rgba(16, 185, 129, 0.1);
        color: #34d399;
        border-color: rgba(16, 185, 129, 0.2);
      }
      .provider-badge.available::before {
        background: #34d399;
        box-shadow: 0 0 8px #34d399;
      }

      .provider-badge.unavailable {
        background: rgba(239, 68, 68, 0.1);
        color: #f87171;
        border-color: rgba(239, 68, 68, 0.2);
      }
      .provider-badge.unavailable::before {
        background: #f87171;
      }

      .provider-badge.loading {
        background: rgba(161, 161, 170, 0.1);
        color: var(--text-muted);
        border-color: rgba(161, 161, 170, 0.2);
      }
      .provider-badge.loading::before {
        background: var(--text-muted);
        animation: pulse 1.5s infinite;
      }

      /* Form */
      .create-form {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        padding: 24px;
        margin-bottom: 32px;
        box-shadow: var(--shadow-md);
      }
      .form-group {
        margin-bottom: 16px;
      }
      .create-form input,
      .create-form textarea {
        width: 100%;
        background: var(--bg-input);
        border: 1px solid var(--border-color);
        color: var(--text-main);
        padding: 12px 16px;
        border-radius: var(--radius-md);
        font-size: 0.95rem;
        font-family: inherit;
        transition: all 0.2s ease;
      }
      .create-form input:focus,
      .create-form textarea:focus {
        outline: none;
        border-color: var(--accent-blue);
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
      }
      .create-form input::placeholder,
      .create-form textarea::placeholder {
        color: var(--text-faint);
      }
      .create-form textarea {
        resize: vertical;
        min-height: 80px;
      }

      .form-actions {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-top: 20px;
      }

      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 18px;
        border-radius: var(--radius-md);
        border: 1px solid transparent;
        cursor: pointer;
        font-size: 0.875rem;
        font-weight: 600;
        transition: all 0.2s ease;
        font-family: inherit;
      }
      button:active {
        transform: scale(0.98);
      }

      .btn-primary {
        background: var(--accent-blue);
        color: white;
        box-shadow: 0 2px 4px rgba(59, 130, 246, 0.3);
      }
      .btn-primary:hover {
        background: var(--accent-blue-hover);
      }

      .btn-seed {
        background: var(--bg-hover);
        color: var(--text-main);
        border-color: var(--border-color);
      }
      .btn-seed:hover {
        background: #2a2a2a;
      }

      .btn-clear {
        background: transparent;
        color: var(--text-muted);
        margin-left: auto;
      }
      .btn-clear:hover {
        color: var(--accent-red);
        background: rgba(239, 68, 68, 0.1);
      }

      /* Todo cards */
      .todo-list {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .todo-card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        padding: 20px;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }
      .todo-card:hover {
        border-color: var(--border-focus);
        box-shadow: var(--shadow-md);
      }

      .todo-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 12px;
        gap: 16px;
      }
      .todo-title {
        font-weight: 600;
        font-size: 1.1rem;
        line-height: 1.4;
        color: #fff;
      }
      .todo-desc {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-bottom: 16px;
        line-height: 1.6;
      }

      .todo-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .btn-sm {
        padding: 8px 14px;
        font-size: 0.8rem;
      }
      .btn-claude {
        background: var(--accent-green);
        color: white;
      }
      .btn-claude:hover:not(:disabled) {
        background: var(--accent-green-hover);
      }

      .btn-codex {
        background: var(--accent-green);
        color: white;
      }
      .btn-codex:hover:not(:disabled) {
        background: var(--accent-green-hover);
      }

      .btn-delete {
        background: transparent;
        color: var(--text-muted);
        border: 1px solid var(--border-color);
      }
      .btn-delete:hover {
        color: var(--accent-red);
        border-color: rgba(239, 68, 68, 0.5);
        background: rgba(239, 68, 68, 0.05);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      /* Status badges */
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: var(--radius-full);
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        white-space: nowrap;
      }
      .badge-pending {
        background: #27272a;
        color: #d4d4d8;
      }
      .badge-running {
        background: rgba(59, 130, 246, 0.15);
        color: #60a5fa;
        border: 1px solid rgba(59, 130, 246, 0.3);
      }
      .badge-running::before {
        content: '';
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #60a5fa;
        border-radius: 50%;
        margin-right: 6px;
        animation: pulse 1.5s infinite;
      }
      .badge-done {
        background: rgba(16, 185, 129, 0.15);
        color: #34d399;
      }
      .badge-failed {
        background: rgba(239, 68, 68, 0.15);
        color: #f87171;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      /* Event log */
      .event-log {
        background: #000;
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        padding: 16px;
        margin-top: 16px;
        max-height: 350px;
        overflow-y: auto;
        font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
        font-size: 0.8rem;
        line-height: 1.6;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
      }
      .event-log::-webkit-scrollbar {
        width: 8px;
      }
      .event-log::-webkit-scrollbar-track {
        background: transparent;
      }
      .event-log::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
      }
      .event-log::-webkit-scrollbar-thumb:hover {
        background: #444;
      }

      .event {
        padding: 3px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      }
      .event:last-child {
        border-bottom: none;
      }

      .event-system {
        color: var(--text-faint);
        font-style: italic;
      }
      .event-assistant {
        color: #e4e4e7;
      }
      .event-thinking {
        color: #a78bfa;
      }
      .event-tool_call {
        color: #60a5fa;
      }
      .event-tool_result {
        color: #34d399;
      }
      .event-tool_result.error {
        color: #f87171;
      }
      .event-result {
        color: #fbbf24;
        font-weight: 600;
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px dashed rgba(251, 191, 36, 0.3);
      }

      /* Result panel */
      .result-panel {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        padding: 16px;
        margin-top: 16px;
        font-size: 0.85rem;
      }
      .result-panel .label {
        color: var(--text-muted);
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 4px;
        font-weight: 600;
      }
      .result-panel .value {
        margin-bottom: 12px;
        color: #fff;
        font-weight: 500;
      }
      .result-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 12px;
      }

      .empty {
        text-align: center;
        color: var(--text-muted);
        padding: 60px 20px;
        background: var(--bg-card);
        border: 1px dashed var(--border-color);
        border-radius: var(--radius-lg);
      }
      .empty-icon {
        font-size: 2rem;
        margin-bottom: 12px;
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Todo Agent</h1>
      <p class="subtitle">Create tasks and dispatch them to AI agents for autonomous execution</p>
    </div>

    <div class="providers" id="providers">
      <span class="provider-badge loading">claude: checking...</span>
      <span class="provider-badge loading">codex: checking...</span>
    </div>

    <div class="create-form">
      <div class="form-group">
        <input
          type="text"
          id="title"
          placeholder="What should the agent do? (e.g. Write a hello world script)"
        />
      </div>
      <div class="form-group" style="margin-bottom: 0">
        <textarea
          id="description"
          placeholder="Add details or specific instructions... (e.g. Create a file hello.ts that prints hello world)"
        ></textarea>
      </div>
      <div class="form-actions">
        <button class="btn-primary" onclick="createTodo()">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            style="margin-right: 6px"
          >
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Add Todo
        </button>
        <button class="btn-seed" onclick="seedDemos()">Seed Examples</button>
        <button class="btn-clear" onclick="clearAll()">Clear All</button>
      </div>
    </div>

    <div class="todo-list" id="todoList"></div>

    <script>
      const providerAvailability = {};
      const eventSources = {};
      let eventLogs = {}; // todoId -> array of event strings

      // -----------------------------------------------------------------------
      // API helpers
      // -----------------------------------------------------------------------
      async function api(method, path, body) {
        const opts = { method, headers: { 'Content-Type': 'application/json' } };
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(path, opts);
        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: res.statusText }));
          throw new Error(err.error || res.statusText);
        }
        if (res.status === 204) return null;
        return res.json();
      }

      // -----------------------------------------------------------------------
      // Load provider availability
      // -----------------------------------------------------------------------
      async function loadProviders() {
        try {
          const data = await api('GET', '/api/providers');
          Object.assign(providerAvailability, data);
          const el = document.getElementById('providers');
          el.innerHTML = Object.entries(data)
            .filter(([name]) => ['claude', 'codex'].includes(name))
            .map(
              ([name, ok]) =>
                `<span class="provider-badge ${ok ? 'available' : 'unavailable'}">${name}: ${ok ? 'available' : 'not found'}</span>`,
            )
            .join('');
        } catch {
          document.getElementById('providers').innerHTML =
            '<span class="provider-badge unavailable">Failed to check providers</span>';
        }
      }

      // -----------------------------------------------------------------------
      // Render
      // -----------------------------------------------------------------------
      async function loadTodos() {
        const todos = await api('GET', '/api/todos');
        render(todos);
      }

      function render(todos) {
        const el = document.getElementById('todoList');
        if (!todos.length) {
          el.innerHTML = `
          <div class="empty">
            <div class="empty-icon">📝</div>
            <div>No tasks yet. Create one above to get started!</div>
          </div>`;
          return;
        }
        el.innerHTML = todos.map(renderTodo).join('');
        // Re-attach SSE for any running todos
        for (const t of todos) {
          if (t.status === 'running' && !eventSources[t.id]) {
            attachSSE(t.id);
          }
        }
      }

      function renderTodo(todo) {
        const canRun = todo.status === 'pending' || todo.status === 'failed';
        const isRunning = todo.status === 'running';
        const isDone = todo.status === 'done' || todo.status === 'failed';

        let extra = '';

        if (isRunning || eventLogs[todo.id]?.length) {
          const logs = (eventLogs[todo.id] || []).join('');
          extra += `<div class="event-log" id="log-${todo.id}">${logs || '<span class="event event-system">Waiting for events...</span>'}</div>`;
        }

        if (isDone && todo.agentResult) {
          const r = todo.agentResult;
          extra += `
          <div class="result-panel">
            ${r.summary ? `<div class="label">Summary</div><div class="value">${esc(r.summary)}</div>` : ''}
            <div class="result-grid">
              ${r.model ? `<div><div class="label">Model</div><div class="value">${esc(r.model)}</div></div>` : ''}
              ${r.costUsd != null ? `<div><div class="label">Est. Cost</div><div class="value">$${r.costUsd.toFixed(4)}</div></div>` : ''}
              <div><div class="label">Duration</div><div class="value">${(r.durationMs / 1000).toFixed(1)}s</div></div>
              <div><div class="label">Exit Code</div><div class="value">${r.exitCode ?? 'N/A'}</div></div>
              ${
                r.usage
                  ? `
                <div><div class="label">Input Tokens</div><div class="value">${r.usage.inputTokens.toLocaleString()}</div></div>
                <div><div class="label">Output Tokens</div><div class="value">${r.usage.outputTokens.toLocaleString()}</div></div>
                <div><div class="label">Total Tokens</div><div class="value">${(r.usage.inputTokens + r.usage.outputTokens).toLocaleString()}</div></div>
                ${r.usage.cachedInputTokens ? `<div><div class="label">Cached Tokens</div><div class="value">${r.usage.cachedInputTokens.toLocaleString()}</div></div>` : ''}
              `
                  : ''
              }
            </div>
            ${r.errorMessage ? `<div class="label" style="margin-top:8px">Error</div><div class="value" style="color:#f87171">${esc(r.errorMessage)}</div>` : ''}
          </div>`;
        }

        return `
        <div class="todo-card" id="card-${todo.id}">
          <div class="todo-header">
            <span class="todo-title">${esc(todo.title)}</span>
            <span class="badge badge-${todo.status}">${todo.status}${todo.agentType ? ` (${todo.agentType})` : ''}</span>
          </div>
          ${todo.description ? `<div class="todo-desc">${esc(todo.description)}</div>` : ''}
          <div class="todo-actions">
            ${
              canRun
                ? `
              <button class="btn-sm btn-claude" onclick="executeTodo('${todo.id}','claude')" ${!providerAvailability.claude ? "disabled title='Claude not available'" : ''}>
                Run with Claude
              </button>
              <button class="btn-sm btn-codex" onclick="executeTodo('${todo.id}','codex')" ${!providerAvailability.codex ? "disabled title='Codex not available'" : ''}>
                Run with Codex
              </button>
            `
                : ''
            }
            ${!isRunning ? `<button class="btn-sm btn-delete" onclick="removeTodo('${todo.id}')">Delete</button>` : ''}
          </div>
          ${extra}
        </div>`;
      }

      function esc(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
      }

      // -----------------------------------------------------------------------
      // Actions
      // -----------------------------------------------------------------------
      async function createTodo() {
        const title = document.getElementById('title').value.trim();
        const description = document.getElementById('description').value.trim();
        if (!title) return alert('Title is required');
        await api('POST', '/api/todos', { title, description });
        document.getElementById('title').value = '';
        document.getElementById('description').value = '';
        loadTodos();
      }

      async function seedDemos() {
        await api('POST', '/api/todos/seed');
        loadTodos();
      }

      async function clearAll() {
        await api('DELETE', '/api/todos');
        eventLogs = {};
        loadTodos();
      }

      async function removeTodo(id) {
        await api('DELETE', `/api/todos/${id}`);
        delete eventLogs[id];
        loadTodos();
      }

      async function executeTodo(id, agentType) {
        try {
          eventLogs[id] = [];
          await api('POST', `/api/todos/${id}/execute`, { agentType });
          loadTodos();
          attachSSE(id);
        } catch (err) {
          alert(err.message);
        }
      }

      // -----------------------------------------------------------------------
      // SSE
      // -----------------------------------------------------------------------
      function attachSSE(todoId) {
        if (eventSources[todoId]) return;
        const es = new EventSource(`/api/todos/${todoId}/events`);
        eventSources[todoId] = es;

        es.onmessage = (e) => {
          const event = JSON.parse(e.data);
          if (event.type === 'close') {
            es.close();
            delete eventSources[todoId];
            loadTodos();
            return;
          }
          if (event.type === 'done') {
            appendEvent(todoId, event);
            return;
          }
          appendEvent(todoId, event);
        };

        es.onerror = () => {
          es.close();
          delete eventSources[todoId];
          loadTodos();
        };
      }

      function appendEvent(todoId, event) {
        const html = formatEvent(event);
        if (!html) return;
        if (!eventLogs[todoId]) eventLogs[todoId] = [];
        eventLogs[todoId].push(html);

        const logEl = document.getElementById(`log-${todoId}`);
        if (logEl) {
          logEl.innerHTML = eventLogs[todoId].join('');
          logEl.scrollTop = logEl.scrollHeight;
        }
      }

      function formatEvent(event) {
        const d = event.data || event;
        switch (event.type) {
          case 'system':
            return `<div class="event event-system">${esc(d.message || 'System event')}</div>`;
          case 'assistant':
            return `<div class="event event-assistant">${esc(d.text || '')}</div>`;
          case 'thinking':
            const text = (d.text || '').slice(0, 100) + ((d.text || '').length > 100 ? '...' : '');
            return `<div class="event event-thinking">[thinking] ${esc(text)}</div>`;
          case 'tool_call':
            return `<div class="event event-tool_call">[tool] ${esc(d.name || 'unknown')}(${truncJson(d.input)})</div>`;
          case 'tool_result':
            const cls = d.isError ? 'event-tool_result error' : 'event-tool_result';
            const content = (d.content || '').slice(0, 200);
            return `<div class="event ${cls}">[result] ${esc(content)}${(d.content || '').length > 200 ? '...' : ''}</div>`;
          case 'result':
            const cost = d.cost != null ? ` | $${d.cost.toFixed(4)}` : '';
            return `<div class="event event-result">[done] ${esc(d.text || '')}${cost}</div>`;
          case 'done':
            return formatDoneEvent(d);
          default:
            return '';
        }
      }

      function formatDoneEvent(d) {
        const parts = [];
        const status = d.status === 'done' ? 'completed' : 'failed';
        parts.push(`Status: ${status}`);
        if (d.durationMs != null) parts.push(`Duration: ${(d.durationMs / 1000).toFixed(1)}s`);
        if (d.costUsd != null) parts.push(`Cost: $${d.costUsd.toFixed(4)}`);
        if (d.usage) {
          const u = d.usage;
          const total = (u.inputTokens || 0) + (u.outputTokens || 0);
          let tokens = `Tokens: ${total.toLocaleString()} total`;
          tokens += ` (${(u.inputTokens || 0).toLocaleString()} input`;
          tokens += `, ${(u.outputTokens || 0).toLocaleString()} output`;
          if (u.cachedInputTokens) tokens += `, ${u.cachedInputTokens.toLocaleString()} cached`;
          tokens += `)`;
          parts.push(tokens);
        }
        if (d.summary) parts.push(`Summary: ${d.summary}`);
        if (d.errorMessage) parts.push(`Error: ${d.errorMessage}`);
        return `<div class="event event-result">[finished] ${esc(parts.join(' | '))}</div>`;
      }

      function truncJson(obj) {
        try {
          const s = JSON.stringify(obj);
          return esc(s.length > 80 ? s.slice(0, 80) + '...' : s);
        } catch {
          return '...';
        }
      }

      // -----------------------------------------------------------------------
      // Init
      // -----------------------------------------------------------------------
      loadProviders().then(() => loadTodos());
      loadTodos();
    </script>
  </body>
</html>
